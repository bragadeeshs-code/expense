services:
  api:
    container_name: expense-api
    build:
      context: .
      dockerfile: Dockerfile
    image: expense-api:latest
    ports:
      - "${PORT:-8010}:8000"
    restart: unless-stopped
    networks:
      - expense-api-net

  postgres:
    image: postgres:17-bookworm
    container_name: expense-postgres
    ports:
      - "${DOCKER_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-expense}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-expense}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - expense-api-net

  minio:
    image: quay.io/minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: expense-minio
    ports:
      - "${MINIO_API_PORT:-9100}:9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadminpassword}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - expense-api-net

  kafka:
    container_name: expense-kafka
    image: apache/kafka:4.1.0
    ports:
      - "${DOCKER_KAFKA_PORT:-9102}:${DOCKER_KAFKA_PORT:-9102}"
    environment:
      KAFKA_LISTENERS: >
        CONTROLLER://0.0.0.0:9091,
        DOCKER://0.0.0.0:9093,
        HOST://0.0.0.0:${DOCKER_KAFKA_PORT:-9102}

      KAFKA_ADVERTISED_LISTENERS: >
        DOCKER://expense-kafka:9093,
        HOST://${KAFKA_ADVERTISED_LISTENER_HOST:-10.160.0.4}:${DOCKER_KAFKA_PORT:-9102}

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        CONTROLLER:PLAINTEXT,
        DOCKER:PLAINTEXT,
        HOST:PLAINTEXT,

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER

      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9091

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - expense-api-net

  redis:
    container_name: expense-redis
    image: redis:8.2-alpine
    volumes:
      - redis_data:/data
    networks:
      - expense-api-net

volumes:
  postgres_data:
  minio_data:
  kafka_data:
  redis_data:

networks:
  expense-api-net:
    external: true
