trigger:
  branches:
    include:
      - main

stages:
  - stage: Deploy
    displayName: Deploy Expense API to Staging
    jobs:
      - deployment: DeployApp
        displayName: Docker Compose Deployment
        environment:
          name: Staging
          resourceName: z-transact-api-stg
          resourceType: virtualMachine

        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - script: |
                    set -e
                    echo "Syncing project files to staging server..."
                    sudo rsync -av --delete ./ /home/ztransact/z-transact/Expense-API --exclude='.env'
                  displayName: "Sync Files to Staging"

                - script: |
                    set -e
                    cd /home/ztransact/z-transact/Expense-API

                    echo "Building Docker images..."
                    sudo docker compose -f compose.yml -f compose.prod.yml build

                    echo "Running database migrations..."
                    sudo docker compose -f compose.yml -f compose.prod.yml run --rm api alembic upgrade head

                    echo "Running seeders..."
                    sudo docker compose -f compose.yml -f compose.prod.yml run --rm api python -m app.seeders.seed

                    echo "Starting application containers..."
                    sudo docker compose -f compose.yml -f compose.prod.yml up -d

                    echo "Deployment completed successfully."
                  displayName: "Build, Migrate, Seed and Start Containers"
